# Docker 部署：前后端统一经 nginx 一个端口访问，上游为 Node 应用（服务名 ai-shotlive）
server {
    listen 80;
    server_name localhost;

    # DNS 解析器（Docker 内置）
    resolver 127.0.0.11 valid=30s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 10m;

    # ============================================
    # 第三方 API 代理（解决浏览器 CORS）
    # ============================================
    location /api/proxy/dashscope/ {
        proxy_pass https://dashscope.aliyuncs.com/;
        proxy_set_header Host dashscope.aliyuncs.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    location /api/proxy/volcengine-tos/ {
        proxy_pass https://ark-content-generation-v2-cn-beijing.tos-cn-beijing.volces.com/;
        proxy_set_header Host ark-content-generation-v2-cn-beijing.tos-cn-beijing.volces.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    location /api/proxy/volcengine/ {
        proxy_pass https://ark.cn-beijing.volces.com/;
        proxy_set_header Host ark.cn-beijing.volces.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # OpenAI
    location /api/proxy/openai/ {
        proxy_pass https://api.openai.com/;
        proxy_set_header Host api.openai.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # Anthropic
    location /api/proxy/anthropic/ {
        proxy_pass https://api.anthropic.com/;
        proxy_set_header Host api.anthropic.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # DeepSeek
    location /api/proxy/deepseek/ {
        proxy_pass https://api.deepseek.com/;
        proxy_set_header Host api.deepseek.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # 智谱 AI
    location /api/proxy/zhipu/ {
        proxy_pass https://open.bigmodel.cn/;
        proxy_set_header Host open.bigmodel.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # Google Gemini
    location /api/proxy/google/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # xAI (Grok)
    location /api/proxy/xai/ {
        proxy_pass https://api.x.ai/;
        proxy_set_header Host api.x.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # SiliconFlow (硅基流动)
    location /api/proxy/siliconflow/ {
        proxy_pass https://api.siliconflow.cn/;
        proxy_set_header Host api.siliconflow.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # Moonshot (月之暗面)
    location /api/proxy/moonshot/ {
        proxy_pass https://api.moonshot.cn/;
        proxy_set_header Host api.moonshot.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # OpenRouter
    location /api/proxy/openrouter/ {
        proxy_pass https://openrouter.ai/api/;
        proxy_set_header Host openrouter.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # ============================================
    # 后端 API 与前端 SPA：统一转发到 Node
    # ============================================
    location /api/ {
        proxy_pass http://ai-shotlive:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        client_max_body_size 500m;
    }

    location / {
        proxy_pass http://ai-shotlive:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
